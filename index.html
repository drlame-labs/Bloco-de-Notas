<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bloco de Notas v3</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Consolas', monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        #titulo { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        
        #editor { 
            width: 100%; min-height: 500px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; 
            padding: 20px; outline: none; white-space: pre-wrap; line-height: 1.6; font-size: 16px;
        }

        .cmd-header { color: #5dade2; font-weight: bold; background: rgba(93, 173, 226, 0.1); padding: 2px 5px; border-radius: 4px; }
        .quote-yellow { 
            color: #f1c40f !important; 
            font-weight: bold; 
            display: inline-block;
        }
        
        #editor {
            color: #e0e0e0;
        }
        
        .indent-tag { 
            display: inline-block;
            content: "";
            color: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            user-select: all; 
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="titulo" placeholder="Título da Nota">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

<style>
    /* A cor amarela só aparece DENTRO de .quote-yellow */
    .quote-yellow { color: #f1c40f !important; font-weight: bold; }
    #editor { color: #e0e0e0; } /* Cor padrão */
</style>

<script>
    const editor = document.getElementById('editor');

    editor.addEventListener('keydown', (e) => {
        // 1. TAB
        if (e.key === 'Tab') {
            e.preventDefault();
            document.execCommand('insertHTML', false, '<span class="indent-tag" contenteditable="false" style="color:rgba(255,255,255,0.1)">|></span>&nbsp;');
        }

        // 2. ASPAS (Força a criação do span e sai dele logo após)
        if (e.key === '"') {
            e.preventDefault();
            // Insere as aspas
            document.execCommand('insertHTML', false, '<span class="quote-yellow">""</span>');
            
            // Move o cursor para dentro (posição 1)
            const sel = window.getSelection();
            const range = document.createRange();
            range.setStart(sel.focusNode, 1);
            range.collapse(true);
            sel.removeAllRanges();
            sel.addRange(range);
        }

        // 3. /n (Executa ao pressionar Enter)
        if (e.key === 'Enter') {
            if (editor.innerText.includes('/n')) {
                e.preventDefault();
                editor.innerHTML = editor.innerHTML.replace('/n', '<span class="cmd-header">##=== </span><span id="target">&nbsp;</span><span class="cmd-header"> ===##</span>');
                
                // Move o cursor para o "target"
                const target = document.getElementById('target');
                const range = document.createRange();
                range.selectNodeContents(target);
                range.collapse(true);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }
    });
</script>
</body>
</html>
