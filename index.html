<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bloco de Notas v3</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Consolas', monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        #titulo { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        
        #editor { 
            width: 100%; min-height: 500px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; 
            padding: 20px; outline: none; white-space: pre-wrap; line-height: 1.6; font-size: 16px;
        }

        .cmd-header { color: #5dade2; font-weight: bold; background: rgba(93, 173, 226, 0.1); padding: 2px 5px; border-radius: 4px; }
        .quote-yellow { color: #f1c40f; font-weight: bold; }
        
        .indent-tag { 
            display: inline-block;
            content: "";
            color: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            user-select: all; 
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="titulo" placeholder="Título da Nota">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

    <script>
        const editor = document.getElementById('editor');

        function insertSpecial(html, moveBack = 0) {
            const sel = window.getSelection();
            const range = sel.getRangeAt(0);
            range.deleteContents();
            
            const el = document.createElement("span");
            el.innerHTML = html;
            const frag = document.createDocumentFragment();
            let node, lastNode;
            while ((node = el.firstChild)) {
                lastNode = frag.appendChild(node);
            }
            range.insertNode(frag);

            const newRange = document.createRange();
            newRange.setStartAfter(lastNode);
            if (moveBack > 0) {
                newRange.setStartBefore(lastNode);
                newRange.setEndBefore(lastNode);
            }
            newRange.collapse(true);
            sel.removeAllRanges();
            sel.addRange(newRange);
        }

        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                insertSpecial('<span class="indent-tag" contenteditable="false">|></span>');
            }

            if (e.key === '"') {
                e.preventDefault();
                insertSpecial('<span class="quote-yellow">""</span>', 1);
                const sel = window.getSelection();
                const range = sel.getRangeAt(0);
                range.setStart(range.startContainer, range.startOffset - 1);
                range.collapse(true);
            }
        });

        editor.addEventListener('input', (e) => {
            const selection = window.getSelection();
            const node = selection.focusNode;
            
            if (node && node.textContent.includes('/n')) {
                const pos = node.textContent.indexOf('/n');
                node.textContent = node.textContent.replace('/n', '');
                
                insertSpecial('<span class="cmd-header">##===</span> Digite aqui <span class="cmd-header">===##</span>&nbsp;');
            }

            localStorage.setItem('nota_v3', editor.innerHTML);
        });

        window.onload = () => {
            editor.innerHTML = localStorage.getItem('nota_v3') || 'Pressione TAB para identar ou digite /n...';
        };
    </script>
</body>
</html>
