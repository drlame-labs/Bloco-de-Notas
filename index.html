<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Bloco de Notas</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Consolas', monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        #titulo { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        
        #editor { 
            width: 100%; min-height: 500px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; 
            padding: 20px; outline: none; white-space: pre-wrap; line-height: 1.6; font-size: 16px;
        }

        .cmd-header { color: #5dade2; font-weight: bold; background: rgba(93, 173, 226, 0.1); padding: 2px 5px; border-radius: 4px; }
        .quote-yellow { color: #f1c40f; font-weight: bold; }
        .indent-mark { color: rgba(255, 255, 255, 0.1); font-weight: bold; user-select: all; }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="titulo" placeholder="Título da Nota">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

    <script>
        const editor = document.getElementById('editor');

        function insertAtCursor(html) {
            const sel = window.getSelection();
            if (sel.getRangeAt && sel.rangeCount) {
                const range = sel.getRangeAt(0);
                range.deleteContents();
                const el = document.createElement("div");
                el.innerHTML = html;
                const frag = document.createDocumentFragment();
                let node, lastNode;
                while ((node = el.firstChild)) {
                    lastNode = frag.appendChild(node);
                }
                range.insertNode(frag);
                if (lastNode) {
                    range.setStartAfter(lastNode);
                    range.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }
        }

        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                insertAtCursor('<span class="indent-mark">|></span>&nbsp;');
            }

            if (e.key === '"') {
                e.preventDefault();
                insertAtCursor('<span class="quote-yellow">"</span><span class="quote-yellow">"</span>');
                
                const sel = window.getSelection();
                const range = sel.getRangeAt(0);
                range.setStart(sel.anchorNode.previousSibling, 1);
                range.collapse(true);
            }
        });

        editor.addEventListener('input', (e) => {
            const content = editor.innerText;

            if (editor.innerHTML.includes('/n')) {
                const selection = window.getSelection();
                const range = selection.getRangeAt(0);
                
                editor.innerHTML = editor.innerHTML.replace(/\/n/g, 
                    '<span class="cmd-header">##===</span> Digite aqui <span class="cmd-header">===##</span>&nbsp;');
                
                const newRange = document.createRange();
                newRange.selectNodeContents(editor);
                newRange.collapse(false);
                selection.removeAllRanges();
                selection.addRange(newRange);
            }

            localStorage.setItem('minha_nota_v2', editor.innerHTML);
        });

        window.onload = () => {
            const salva = localStorage.getItem('minha_nota_v2');
            if(salva) editor.innerHTML = salva;
        };
    </script>
</body>
</html>
