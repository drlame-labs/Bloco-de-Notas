<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bloco de Notas v3</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Consolas', monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        #titulo { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        
        #editor { 
            width: 100%; min-height: 500px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; 
            padding: 20px; outline: none; white-space: pre-wrap; line-height: 1.6; font-size: 16px;
        }

        .cmd-header { color: #5dade2; font-weight: bold; background: rgba(93, 173, 226, 0.1); padding: 2px 5px; border-radius: 4px; }
        .quote-yellow { 
            color: #f1c40f !important; 
            font-weight: bold; 
            display: inline-block;
        }
        
        /* Isso remove a cor caso você tente forçar em outros lugares */
        #editor {
            color: #e0e0e0; /* Cor padrão do resto do texto */
        }
        
        .indent-tag { 
            display: inline-block;
            content: "";
            color: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            user-select: all; 
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="titulo" placeholder="Título da Nota">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

    <script>
        const editor = document.getElementById('editor');
    
        // Função para inserir texto mantendo o controle do cursor
        function insertAtCursor(html, offset = 0) {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);
            range.deleteContents();
            
            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = html;
            const frag = document.createDocumentFragment();
            let node, lastNode;
            while ((node = tempDiv.firstChild)) lastNode = frag.appendChild(node);
            
            range.insertNode(frag);
            
            // Coloca o cursor dentro do elemento inserido, no offset definido
            if (lastNode) {
                const newRange = document.createRange();
                newRange.setStart(lastNode.childNodes[0] || lastNode, offset);
                newRange.collapse(true);
                selection.removeAllRanges();
                selection.addRange(newRange);
            }
        }
    
        editor.addEventListener('keydown', (e) => {
            // TAB
            if (e.key === 'Tab') {
                e.preventDefault();
                insertAtCursor('<span class="indent-tag" contenteditable="false">|></span>&nbsp;');
            }
            
            // Aspas
            if (e.key === '"') {
                e.preventDefault();
                // Inserimos aspas amarelas e movemos o cursor para a posição 1 (meio)
                insertAtCursor('<span class="quote-yellow">""</span>', 1);
            }
        });
    
        editor.addEventListener('keydown', (e) => {
            // Comando /n (Detecta ao dar espaço)
            if (e.key === '"') {
                e.preventDefault();
                // Inserimos um container amarelo que já contém o cursor no meio
                insertAtCursor('<span class="quote-yellow">""</span>', 1);
            }
                if (node.textContent.includes('/n')) {
                    e.preventDefault();
                    node.textContent = node.textContent.replace('/n', '');
                    // Insere sem espaços extras entre o == e a marcação
                    insertAtCursor('<span class="cmd-header">##===</span>&nbsp;<span class="cmd-header">===##</span>&nbsp;');
                }
            }
        });
    
        // Salvar no navegador
        editor.addEventListener('input', () => {
            localStorage.setItem('nota_final', editor.innerHTML);
        });
    
        window.onload = () => {
            editor.innerHTML = localStorage.getItem('nota_final') || '';
        };
</script>
</body>
</html>
