<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bloco de Notas Personalizado</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; }
        #titulo { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        #editor { width: 100%; min-height: 500px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 20px; outline: none; white-space: pre-wrap; line-height: 1.6; font-family: monospace; }
        
        /* Estilos específicos que você pediu */
        .cmd-header { color: #5dade2; font-weight: bold; } /* ##=== */
        .quote-yellow { color: #f1c40f; }                /* "Texto" */
        .indent-mark { opacity: 0.1; color: #fff; user-select: none; } /* |> */
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="titulo" placeholder="Título da Nota">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const titulo = document.getElementById('titulo');

        // 1. Identação com TAB (|>)
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const sel = window.getSelection();
                const range = sel.getRangeAt(0);
                const span = document.createElement("span");
                span.className = "indent-mark";
                span.innerText = "|>";
                range.insertNode(span);
                range.insertNode(document.createTextNode(" "));
                range.collapse(false);
            }
        });

        // 2. Comando /n e Aspas Amarelas
        editor.addEventListener('input', () => {
            let html = editor.innerHTML;

            // Transforma /n
            if (html.includes('/n&nbsp;')) {
                html = html.replace('/n&nbsp;', '<span class="cmd-header">##=== </span> TEXTO <span class="cmd-header"> ===##</span>&nbsp;');
                editor.innerHTML = html;
                focarNoFinal();
            }

            // Salva no navegador (LocalStorage)
            localStorage.setItem('nota_salva', editor.innerHTML);
            localStorage.setItem('titulo_salvo', titulo.value);
        });

        // Carregar dados ao abrir
        window.onload = () => {
            editor.innerHTML = localStorage.getItem('nota_salva') || 'Digite /n para cabeçalho...';
            titulo.value = localStorage.getItem('titulo_salvo') || '';
        };

        function focarNoFinal() {
            const range = document.createRange();
            const sel = window.getSelection();
            range.selectNodeContents(editor);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);
        }
    </script>
</body>
</html>
