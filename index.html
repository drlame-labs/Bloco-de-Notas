<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bloco de Notas Personalizado</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; }
        #titulo { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        #editor { width: 100%; min-height: 500px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 20px; outline: none; white-space: pre-wrap; line-height: 1.6; font-family: monospace; }
        
        /* Estilos específicos que você pediu */
        .cmd-header { color: #5dade2; font-weight: bold; } /* ##=== */
        .quote-yellow { color: #f1c40f; }                /* "Texto" */
        .indent-mark { opacity: 0.1; color: #fff; user-select: none; } /* |> */
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="titulo" placeholder="Título da Nota">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

    <script>
    const editor = document.getElementById('editor');
    const titulo = document.getElementById('titulo');
    
    // 1. Atalhos de Teclado
    editor.addEventListener('keydown', (e) => {
        // Identação com Tab
        if (e.key === 'Tab') {
            e.preventDefault();
            document.execCommand('insertHTML', false, '<span class="indent-mark">|></span>&nbsp;');
        }
    });
    
    // 2. Processamento de Texto e Comandos
    editor.addEventListener('input', () => {
        let content = editor.innerHTML;
    
        // Comando /n
        if (content.includes('/n&nbsp;')) {
            const header = '<span class="cmd-header">##=== </span> TÍTULO <span class="cmd-header"> ===##</span>&nbsp;';
            editor.innerHTML = content.replace('/n&nbsp;', header);
            focarNoFinal();
        }
    
        // Salvar Automaticamente
        localStorage.setItem('nota_v1', editor.innerHTML);
        localStorage.setItem('titulo_v1', titulo.value);
    });
    
    // Carregar ao abrir
    window.onload = () => {
        editor.innerHTML = localStorage.getItem('nota_v1') || 'Digite /n para começar...';
        titulo.value = localStorage.getItem('titulo_v1') || '';
    };
    
    function focarNoFinal() {
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(editor);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
    }
    </script>
</body>
</html>
