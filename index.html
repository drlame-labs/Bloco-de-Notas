<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bloco de Notas v3</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Consolas', monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        #titulo { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        
        #editor { 
            width: 100%; min-height: 500px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; 
            padding: 20px; outline: none; white-space: pre-wrap; line-height: 1.6; font-size: 16px;
        }

        .cmd-header { color: #5dade2; font-weight: bold; background: rgba(93, 173, 226, 0.1); padding: 2px 5px; border-radius: 4px; }
        .quote-yellow { 
            color: #f1c40f !important; 
            font-weight: bold; 
            display: inline-block;
        }
        
        #editor {
            color: #e0e0e0;
        }
        
        .indent-tag { 
            display: inline-block;
            content: "";
            color: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            user-select: all; 
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="titulo" placeholder="Título da Nota">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

    <script>
        const editor = document.getElementById('editor');
    
        function insertAtCursor(html, offset = 0) {
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const range = sel.getRangeAt(0);
            range.deleteContents();
            
            const el = document.createElement("span");
            el.innerHTML = html;
            range.insertNode(el);
            
            // Move o cursor para dentro do elemento
            const newRange = document.createRange();
            newRange.setStart(el.childNodes[0], offset);
            newRange.collapse(true);
            sel.removeAllRanges();
            sel.addRange(newRange);
        }
    
        editor.addEventListener('keydown', (e) => {
            // TAB
            if (e.key === 'Tab') {
                e.preventDefault();
                insertAtCursor('<span class="indent-tag" contenteditable="false">|></span>&nbsp;');
            }
            
            if (e.key === '"') {
                e.preventDefault();
                document.execCommand('insertHTML', false, '<span class="quote-yellow">""</span>');
                const sel = window.getSelection();
                const range = sel.getRangeAt(0);
                range.setStart(range.startContainer, 1);
                range.collapse(true);
            }
    
            if (e.key === 'Enter') {
                const sel = window.getSelection();
                if (sel.anchorNode.textContent.includes('/n')) {
                    e.preventDefault();
                    sel.anchorNode.textContent = sel.anchorNode.textContent.replace('/n', '');
                    insertAtCursor('<span class="cmd-header">##=== </span><span id="cursor-pos">&nbsp;</span><span class="cmd-header"> ===##</span>&nbsp;', 0);
                }
            }
        });
    
        editor.addEventListener('input', () => {
            localStorage.setItem('nota_final', editor.innerHTML);
        });
    
        window.onload = () => {
            editor.innerHTML = localStorage.getItem('nota_final') || '';
        };
    </script>
</body>
</html>
