<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bloco de Notas v3</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Consolas', monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        #titulo { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        #editor { 
            width: 100%; min-height: 500px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; 
            padding: 20px; outline: none; white-space: pre-wrap; line-height: 1.6; font-size: 16px;
        }
        .cmd-header { color: #5dade2; font-weight: bold; background: rgba(93, 173, 226, 0.1); padding: 2px 5px; border-radius: 4px; }
        .quote-yellow { 
            color: #f1c40f !important; 
            font-weight: bold; 
            display: inline-block;
        }
        #editor {
            color: #e0e0e0;
        }
        .indent-tag { 
            display: inline-block;
            color: rgba(255, 255, 255, 0.05);
            font-weight: bold;
            user-select: all;
            opacity: 0.15;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="titulo" placeholder="Título da Nota">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

<style>
    .quote-yellow { color: #f1c40f !important; font-weight: bold; }
    #editor { color: #e0e0e0; } 
</style>

        <script>
        const editor = document.getElementById('editor');
        let suppressInput = false;
        
        function formatarEditor() {
            if (suppressInput) return;
            
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            
            const range = selection.getRangeAt(0);
            const preCaretRange = range.cloneRange();
            preCaretRange.selectNodeContents(editor);
            preCaretRange.setEnd(range.endContainer, range.endOffset);
            const caretOffset = preCaretRange.toString().length;
        
            let text = editor.innerText;
            let formatted = text.replace(/"([^"]*)"/g, '<span class="quote-yellow">"$1"</span>');
            editor.innerHTML = formatted;
        
            restoreCursor(editor, caretOffset);
            localStorage.setItem('nota_final', editor.innerHTML);
        }
        
        function restoreCursor(el, offset) {
            const selection = window.getSelection();
            const range = document.createRange();
            let charCount = 0;
            let found = false;
        
            function traverseNodes(node) {
                if (found) return;
                if (node.nodeType === 3) {
                    const nextCharCount = charCount + node.length;
                    if (offset <= nextCharCount) {
                        range.setStart(node, offset - charCount);
                        range.collapse(true);
                        found = true;
                    }
                    charCount = nextCharCount;
                } else {
                    for (let i = 0; i < node.childNodes.length; i++) {
                        traverseNodes(node.childNodes[i]);
                    }
                }
            }
            traverseNodes(el);
            selection.removeAllRanges();
            selection.addRange(range);
        }
        
        editor.addEventListener('input', () => {
            formatarEditor();
        });

        editor.addEventListener('keydown', (e) => {
            // Impedir comportamentos padrão do navegador
            if (e.key === 'Tab') {
                e.preventDefault();
                suppressInput = true;
                
                const sel = window.getSelection();
                const range = sel.getRangeAt(0);
                
                const indent = document.createElement('span');
                indent.className = 'indent-tag';
                indent.contentEditable = 'false';
                indent.textContent = '|>';
                
                range.insertNode(indent);
                range.setStartAfter(indent);
                range.collapse(true);
                
                sel.removeAllRanges();
                sel.addRange(range);
                
                suppressInput = false;
                localStorage.setItem('nota_final', editor.innerHTML);
            }
        });
        
        editor.addEventListener('keydown', (e) => {
            const sel = window.getSelection();
            const node = sel.anchorNode;
            
            if (!node) return;
            
            const text = node.textContent || '';
            const offset = sel.anchorOffset;
            
            // Detectar /n seguido de espaço
            if (e.key === ' ' && offset >= 2) {
                const beforeCursor = text.substring(Math.max(0, offset - 2), offset);
                
                if (beforeCursor === '/n') {
                    e.preventDefault();
                    suppressInput = true;
                    
                    // Remove /n
                    const newText = text.substring(0, offset - 2) + text.substring(offset);
                    node.textContent = newText;
                    
                    const range = sel.getRangeAt(0);
                    
                    // Criar header
                    const spanStart = document.createElement('span');
                    spanStart.className = 'cmd-header';
                    spanStart.contentEditable = 'false';
                    spanStart.textContent = '##=== ';
                    
                    const spanEnd = document.createElement('span');
                    spanEnd.className = 'cmd-header';
                    spanEnd.contentEditable = 'false';
                    spanEnd.textContent = ' ===##';
                    
                    // Inserir spans
                    range.setStart(node, offset - 2);
                    range.collapse(true);
                    range.insertNode(spanStart);
                    range.insertNode(spanEnd);
                    
                    // Posicionar cursor entre os dois spans
                    range.setStartAfter(spanStart);
                    range.setEndBefore(spanEnd);
                    range.collapse(false);
                    
                    sel.removeAllRanges();
                    sel.addRange(range);
                    
                    suppressInput = false;
                    localStorage.setItem('nota_final', editor.innerHTML);
                }
            }
        });
    </script>
</body>
</html>
