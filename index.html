<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bloco de Notas v3</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Consolas', monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        #titulo { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        
        #editor { 
            width: 100%; min-height: 500px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; 
            padding: 20px; outline: none; white-space: pre-wrap; line-height: 1.6; font-size: 16px;
        }

        .cmd-header { color: #5dade2; font-weight: bold; background: rgba(93, 173, 226, 0.1); padding: 2px 5px; border-radius: 4px; }
        .quote-yellow { color: #f1c40f; font-weight: bold; }
        
        .indent-tag { 
            display: inline-block;
            content: "";
            color: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            user-select: all; 
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="titulo" placeholder="Título da Nota">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

      <script>
        const editor = document.getElementById('editor');
    
        // Função que força o cursor para um lugar específico dentro de um elemento
        function setCursor(node, offset) {
            const range = document.createRange();
            const sel = window.getSelection();
            range.setStart(node, offset);
            range.collapse(true);
            sel.removeAllRanges();
            sel.addRange(range);
        }
    
        editor.addEventListener('keydown', (e) => {
            // TAB para identação
            if (e.key === 'Tab') {
                e.preventDefault();
                document.execCommand('insertHTML', false, '<span class="indent-tag" contenteditable="false">|></span>&nbsp;');
            }
    
            // Aspas com cursor no meio
            if (e.key === '"') {
                e.preventDefault();
                document.execCommand('insertHTML', false, '<span class="quote-yellow">""</span>');
                // Move o cursor para dentro das aspas
                const sel = window.getSelection();
                const node = sel.focusNode;
                setCursor(node, 1); // Posição 1 (entre as aspas)
            }
        });
    
        editor.addEventListener('keyup', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                let html = editor.innerHTML;
                
                if (html.includes('/n')) {
                    // Substitui pelo cabeçalho
                    const novoHTML = html.replace('/n', '<span class="cmd-header">##=== </span><span id="target"></span><span class="cmd-header"> ===##</span>');
                    editor.innerHTML = novoHTML;
                    
                    // Move o cursor para o span "target" que criamos no meio
                    const target = document.getElementById('target');
                    setCursor(target, 0);
                }
            }
        });
    </script>
</body>
</html>
