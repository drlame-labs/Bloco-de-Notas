<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bloco de Notas v3</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Consolas', monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; }
        #titulo { width: 100%; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.2rem; margin-bottom: 20px; outline: none; }
        
        #editor { 
            width: 100%; min-height: 500px; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; 
            padding: 20px; outline: none; white-space: pre-wrap; line-height: 1.6; font-size: 16px;
        }

        .cmd-header { color: #5dade2; font-weight: bold; background: rgba(93, 173, 226, 0.1); padding: 2px 5px; border-radius: 4px; }
        .quote-yellow { 
            color: #f1c40f !important; 
            font-weight: bold; 
            display: inline-block;
        }
        
        #editor {
            color: #e0e0e0;
        }
        
        .indent-tag { 
            display: inline-block;
            content: "";
            color: rgba(255, 255, 255, 0.05);
            font-weight: bold;
            user-select: all; 
            margin-right: 2px;
            opacity: 0.2;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="titulo" placeholder="Título da Nota">
        <div id="editor" contenteditable="true" spellcheck="false"></div>
    </div>

<style>
    .quote-yellow { color: #f1c40f !important; font-weight: bold; }
    #editor { color: #e0e0e0; } 
</style>

        <script>
        const editor = document.getElementById('editor');
    
        function formatarEditor() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            
            const range = selection.getRangeAt(0);
            const preCaretRange = range.cloneRange();
            preCaretRange.selectNodeContents(editor);
            preCaretRange.setEnd(range.endContainer, range.endOffset);
            const caretOffset = preCaretRange.toString().length;
    
            let text = editor.innerText;
            let formatted = text.replace(/"([^"]*)"/g, '<span class="quote-yellow">"$1"</span>');
            editor.innerHTML = formatted;
    
            restoreCursor(editor, caretOffset);
        }
    
        function restoreCursor(el, offset) {
            const selection = window.getSelection();
            const range = document.createRange();
            let charCount = 0;
            let found = false;
    
            function traverseNodes(node) {
                if (found) return;
                if (node.nodeType === 3) { // Nó de texto
                    const nextCharCount = charCount + node.length;
                    if (offset <= nextCharCount) {
                        range.setStart(node, offset - charCount);
                        range.collapse(true);
                        found = true;
                    }
                    charCount = nextCharCount;
                } else {
                    for (let i = 0; i < node.childNodes.length; i++) {
                        traverseNodes(node.childNodes[i]);
                    }
                }
            }
            traverseNodes(el);
            selection.removeAllRanges();
            selection.addRange(range);
        }
    
        editor.addEventListener('input', () => {
            formatarEditor();
            localStorage.setItem('nota_final', editor.innerHTML);
        });
    
        const editor2 = document.getElementById('editor');

        editor2.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                document.execCommand('insertHTML', false, '<span class="indent-tag">|></span>');
            }
        });
        
        editor2.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                const sel = window.getSelection();
                const node = sel.anchorNode;
                
                if (node && node.textContent.includes('/n')) {
                    e.preventDefault();
                    
                    // Remove o /n
                    const text = node.textContent.replace('/n', '');
                    node.textContent = text;
                    
                    // Cria o header
                    const span = document.createElement('span');
                    span.className = 'cmd-header';
                    span.textContent = '##=== ';
                    
                    const range = sel.getRangeAt(0);
                    range.insertNode(span);
                    
                    // Cria o fechamento
                    const spanClose = document.createElement('span');
                    spanClose.className = 'cmd-header';
                    spanClose.textContent = ' ===##';
                    
                    range.setStartAfter(span);
                    range.insertNode(spanClose);
                    range.setStartBetween(span, spanClose);
                    range.collapse(true);
                    
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }
        });
    </script>
</body>
</html>
